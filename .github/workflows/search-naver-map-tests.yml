name: search-naver-map tests

on:
  push:
    paths:
      - "search-naver-map/**"
      - ".github/workflows/search-naver-map-tests.yml"
  pull_request:
    paths:
      - "search-naver-map/**"
      - ".github/workflows/search-naver-map-tests.yml"

permissions:
  contents: read

jobs:
  offline-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Bootstrap isolated skill runtime
        working-directory: search-naver-map
        run: python3 scripts/bootstrap.py --dev
      - name: Run offline tests
        working-directory: search-naver-map
        run: .venv/bin/python -m pytest
      - name: Compile Python sources
        working-directory: search-naver-map
        run: .venv/bin/python -m compileall -q naver_place scripts
